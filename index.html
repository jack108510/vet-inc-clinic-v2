function renderMonitoringModal(report) {
  const body = document.getElementById('reportModalBody');
  body.innerHTML = `<div class="loading"><div class="spinner"></div> Loading monitoring data…</div>`;
  const monitorId = report.data?.monitoring_id || report.id;
  Promise.all([
    sbFetch(`monitoring_items?id=eq.${monitorId}&limit=1`),
    sbFetch(`monitoring_daily?monitoring_id=eq.${monitorId}&order=day_offset.asc&limit=100`).catch(() => []),
    sbFetch(`monitoring_competitors?monitoring_id=eq.${monitorId}&order=competitor_price.asc`).catch(() => []),
  ]).then(([items, daily, competitors]) => {
    if (!items || !items.length) { body.innerHTML = `<div class="empty-state"><p>No monitoring data</p></div>`; return; }
    const row = items[0];
    const m = {
      desc: row.service_name, code: row.service_code, category: row.category || 'Service',
      oldPrice: parseFloat(row.old_price), newPrice: parseFloat(row.new_price),
      pct: parseFloat(row.pct_change), daysPost: row.days_post,
      preVolume42d: row.pre_volume_period, postVolume42d: row.post_volume_period,
      revenuePre42d: row.revenue_pre_period, revenuePost42d: row.revenue_post_period,
      expectedUplift: row.expected_uplift, marketAvg: parseFloat(row.market_avg),
    };
    const volChangePct = m.preVolume42d > 0 ? ((m.postVolume42d - m.preVolume42d) / m.preVolume42d) * 100 : 0;
    const revenueDelta = m.revenuePost42d - m.revenuePre42d;
    const realizationRate = m.expectedUplift > 0 ? Math.round((revenueDelta / m.expectedUplift) * 100) : 0;
    const annualProjection = m.daysPost > 0 ? Math.round((revenueDelta / m.daysPost) * 365) : 0;
    let riskLevel = 'low';
    if (volChangePct < -8) riskLevel = 'high';
    else if (volChangePct < -3) riskLevel = 'medium';
    const competitorsArr = Array.isArray(competitors) ? competitors.map(c => ({ name: c.competitor_name, price: parseFloat(c.competitor_price), distance: c.distance_km })) : [];
    const riskColors = {
      low: { bg: '#f0fdf4', border: '#bbf7d0', text: '#15803d', label: 'Looking Good' },
      medium: { bg: '#fffbeb', border: '#fde68a', text: '#b45309', label: 'Keep an Eye On It' },
      high: { bg: '#fef2f2', border: '#fecaca', text: '#dc2626', label: 'Action Needed' },
    };
    const rc = riskColors[riskLevel];
    const reducedPrice = ((m.oldPrice + m.newPrice) / 2).toFixed(2);
    body.innerHTML = `
      <div class="edit-service-card" style="margin-bottom:1rem">
        <div class="edit-service-name">${m.desc}</div>
        <div class="edit-service-code">${m.code} · ${m.category} · ${m.daysPost} days post-change</div>
        <div style="display:flex;align-items:center;gap:.5rem;margin-top:.75rem">
          <span style="font-size:1.1rem;color:var(--muted)">$${m.oldPrice.toFixed(2)}</span>
          <span style="color:var(--muted)">→</span>
          <span style="font-size:1.2rem;font-weight:800">$${m.newPrice.toFixed(2)}</span>
          <span class="change-delta-badge" style="background:#dcfce7;color:#15803d">+${m.pct.toFixed(1)}%</span>
        </div>
      </div>
      <div style="background:${rc.bg};border:1px solid ${rc.border};border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem">
        <div style="font-weight:800;color:${rc.text};margin-bottom:.5rem">${rc.label}</div>
        <div style="font-size:.82rem;color:var(--text);line-height:1.6">
          Revenue has ${revenueDelta >= 0 ? 'increased' : 'decreased'} but volume is ${volChangePct >= 0 ? 'up' : 'down'} ${Math.abs(volChangePct).toFixed(1)}%.
          The ${m.pct.toFixed(1)}% increase on ${m.desc.toLowerCase()} is ${riskLevel === 'high' ? 'showing significant client pushback' : riskLevel === 'medium' ? 'showing some signs of pushback' : 'performing well'}.
        </div>
      </div>
      <div style="display:flex;gap:.75rem;margin-bottom:1rem;flex-wrap:wrap">
        <div class="stat-card ${revenueDelta >= 0 ? 'success' : 'warning'}"><div class="label">Revenue change</div><div class="value">${revenueDelta >= 0 ? '+' : ''}${fmtK(revenueDelta)}</div></div>
        <div class="stat-card ${volChangePct >= 0 ? 'success' : 'warning'}"><div class="label">Volume change</div><div class="value">${Math.abs(volChangePct).toFixed(1)}%</div></div>
        <div class="stat-card"><div class="label">Realized</div><div class="value">${realizationRate}%</div></div>
        <div class="stat-card"><div class="label">Projected/yr</div><div class="value" style="color:#2563eb">+${fmtK(annualProjection)}</div></div>
      </div>
      ${competitorsArr.length ? `
        <div class="chart-title">MARKET POSITION</div>
        <div style="display:flex;gap:1rem;background:#f8fafc;border-radius:10px;padding:.85rem;margin-bottom:1rem">
          <div style="text-align:center"><div style="font-weight:800">$${m.marketAvg.toFixed(2)}</div><div style="font-size:.72rem;color:var(--muted)">Market avg</div></div>
          <div style="text-align:center"><div style="font-weight:800">$${m.newPrice.toFixed(2)}</div><div style="font-size:.72rem;color:var(--muted)">Your price</div></div>
        </div>
        ${competitorsArr.map(c => {
          const isCheaper = c.price < m.newPrice;
          return `<div style="display:flex;align-items:center;gap:.75rem;padding:.5rem 0;border-bottom:1px solid var(--border)">
            <div style="flex:1"><div style="font-size:.84rem;font-weight:600">${c.name}</div><div style="font-size:.72rem;color:var(--muted)">${c.distance}</div></div>
            <span style="font-weight:700;color:${isCheaper ? 'var(--muted)' : '#15803d'}">$${c.price.toFixed(2)}</span>
          </div>`;
        }).join('')}
      ` : ''}
      <div style="display:flex;gap:.5rem;margin-top:1rem;flex-wrap:wrap">
        ${riskLevel === 'high' ? `
          <button class="btn-activate secondary" onclick="monitorAction('${monitorId}','revert')">Revert to $${m.oldPrice.toFixed(2)}</button>
          <button class="btn-activate secondary" onclick="monitorAction('${monitorId}','reduce')">Reduce to $${reducedPrice}</button>
        ` : riskLevel === 'medium' ? `
          <button class="btn-activate secondary" onclick="monitorAction('${monitorId}','reduce')">Reduce to $${reducedPrice}</button>
          <button class="btn-activate success" onclick="monitorAction('${monitorId}','approve')">Keep at $${m.newPrice.toFixed(2)}</button>
        ` : `
          <button class="btn-activate success" onclick="monitorAction('${monitorId}','approve')">Keep at $${m.newPrice.toFixed(2)}</button>
        `}
        <button class="btn-activate secondary" onclick="monitorAction('${monitorId}','monitor')">1 More Week</button>
      </div>
    `;
  }).catch(() => { body.innerHTML = `<div class="empty-state"><p>Couldn't load monitoring data</p></div>`; });
}

async function monitorAction(monitorId, verdict) {
  const statusMap = { approve: 'resolved', revert: 'resolved', reduce: 'resolved', monitor: 'watch' };
  await sbPatch(`monitoring_items?id=eq.${monitorId}`, { status: statusMap[verdict] || 'watch' }).catch(() => {});
  showToast('Action saved', 'success');
  closeReportModal();
  loadReports();
}

// ============================================================
// CHANGES TAB — mobile ProjectsScreen port (service price editor)
// ============================================================
let changesServices = null;
let changesSelected = null;
let changesNewPrice = '';
let changesSaved = false;
let changesSaving = false;

async function loadChanges() {
  const el = document.getElementById('changes-content');
  try {
    const data = await sbFetch('dhv_service_history?select=description,amount,quantity,service_code,service_type,administered_at&order=administered_at.desc&limit=500');
    if (!Array.isArray(data)) { changesServices = []; }
    else {
      const map = {};
      data.forEach(r => {
        const code = r.service_code || r.description || 'unknown';
        if (!map[code]) map[code] = { service_code: code, service_name: r.description || code, service_type: r.service_type || '', amounts: [], quantities: [], last_date: r.administered_at };
        if (r.amount != null) map[code].amounts.push(parseFloat(r.amount));
        if (r.quantity != null) map[code].quantities.push(parseFloat(r.quantity));
        if (r.administered_at && r.administered_at > map[code].last_date) map[code].last_date = r.administered_at;
      });
      changesServices = Object.values(map).map(s => ({
        ...s,
        price_old: s.amounts.length ? (s.amounts.reduce((a,b) => a+b, 0) / s.amounts.length) : 0,
        volume: s.quantities.length,
        annual_revenue: s.amounts.reduce((a,b) => a+b, 0),
      })).sort((a,b) => b.annual_revenue - a.annual_revenue);
    }
    changesSelected = null; changesSaved = false; changesNewPrice = '';
    renderChanges();
  } catch (err) {
    el.innerHTML = `<div class="empty-state"><p>⚠️ ${err.message}</p></div>`;
  }
}

function renderChanges() {
  const el = document.getElementById('changes-content');
  if (changesSaved && changesSelected) {
    const currentPrice = parseFloat(changesSelected.price_old);
    const parsedNew = parseFloat(changesNewPrice) || 0;
    const annualImpact = (parsedNew - currentPrice) * (changesSelected.volume || 1);
    el.innerHTML = `
      <div class="quick-success">
        <div class="quick-success-icon">✅</div>
        <div class="quick-success-title">Price Updated</div>
        <div class="quick-success-detail">${changesSelected.service_name}: $${currentPrice.toFixed(2)} → $${parsedNew.toFixed(2)}</div>
        ${annualImpact > 0 ? `<div class="quick-success-detail" style="color:#16a34a;margin-top:4px">Est. revenue impact: +$${annualImpact.toFixed(0)}/yr</div>` : ''}
      </div>
    `;
    setTimeout(() => { if (changesSaved) { changesSelected = null; changesNewPrice = ''; changesSaved = false; renderChanges(); } }, 1800);
    return;
  }
  if (changesSelected) {
    renderChangesEditor();
    return;
  }
  // Default view: search + top services
  if (changesServices === null) {
    el.innerHTML = `<div class="loading"><div class="spinner"></div> Loading services…</div>`;
    return;
  }
  if (changesServices.length === 0) {
    el.innerHTML = `
      <div class="quick-empty">
        <div class="quick-empty-icon">📄</div>
        <p>No service history yet.<br>Services will appear here once data syncs.</p>
      </div>
    `;
    return;
  }
  el.innerHTML = `
    <div class="quick-search-wrap">
      <div class="quick-search-box">
        <span style="color:var(--muted)">🔍</span>
        <input type="text" class="quick-search-input" placeholder="Search services..." id="changesSearch" oninput="searchChanges(this.value)">
      </div>
    </div>
    <div id="changesList"></div>
  `;
  renderChangesList(changesServices.slice(0, 20), 'TOP SERVICES BY REVENUE');
}

function renderChangesList(list, label) {
  const listEl = document.getElementById('changesList');
  if (!listEl) return;
  if (list.length === 0) {
    listEl.innerHTML = `<div class="quick-empty"><div class="quick-empty-icon">🔍</div><p>No services found</p></div>`;
    return;
  }
  listEl.innerHTML = `
    ${label ? `<div class="home-section-label" style="font-size:.72rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.09em;margin:0 0 .75rem">${label}</div>` : ''}
    ${list.map((svc, i) => `
      <div class="quick-result-card" onclick="pickService(${i})" data-idx="${i}">
        <div style="flex:1;min-width:0">
          <div class="quick-result-name">${svc.service_name}</div>
          <div class="quick-result-code">${svc.service_code} · ${svc.volume} visits/yr</div>
        </div>
        <div style="display:flex;align-items:center;gap:.5rem">
          <span class="quick-result-price">$${parseFloat(svc.price_old).toFixed(2)}</span>
          <span style="color:#cbd5e1">›</span>
        </div>
      </div>
    `).join('')}
  `;
  // store current list for pickService indexing
  changesCurrentList = list;
}
let changesCurrentList = [];

function searchChanges(q) {
  if (!q || q.trim().length < 1) { renderChangesList(changesServices.slice(0, 20), 'TOP SERVICES BY REVENUE'); return; }
  const filtered = changesServices.filter(s =>
    (s.service_name || '').toLowerCase().includes(q.trim().toLowerCase()) ||
    (s.service_code || '').toLowerCase().includes(q.trim().toLowerCase())
  ).slice(0, 20);
  renderChangesList(filtered, '');
}

function pickService(idx) {
  changesSelected = changesCurrentList[idx];
  changesNewPrice = parseFloat(changesSelected.price_old).toFixed(2);
  changesSaved = false;
  renderChangesEditor();
}

function renderChangesEditor() {
  const el = document.getElementById('changes-content');
  const currentPrice = parseFloat(changesSelected.price_old);
  const parsedNew = parseFloat(changesNewPrice) || 0;
  const diff = parsedNew - currentPrice;
  const pct = currentPrice > 0 ? ((diff / currentPrice) * 100).toFixed(1) : '0';
  const annualImpact = diff * (changesSelected.volume || 1);
  el.innerHTML = `
    <div class="edit-service-card">
      <div class="edit-service-name">${changesSelected.service_name}</div>
      <div class="edit-service-code">${changesSelected.service_code} · Current avg: $${currentPrice.toFixed(2)} · ${changesSelected.volume} visits/yr</div>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.2rem 1.4rem;margin-bottom:1.25rem">
      <div class="edit-price-label">NEW PRICE</div>
      <div class="edit-price-input-row">
        <span class="edit-dollar">$</span>
        <input type="number" step="0.01" class="edit-price-input" id="changesPriceInput" value="${changesNewPrice}" oninput="changesNewPrice=this.value;renderChangesEditor()">
      </div>
      ${diff !== 0 ? `<div class="edit-delta-badge" style="background:${diff > 0 ? '#dcfce7' : '#fee2e2'};color:${diff > 0 ? '#15803d' : '#dc2626'}">${diff > 0 ? '+' : ''}${diff.toFixed(2)}  (${diff > 0 ? '+' : ''}${pct}%)</div>` : ''}
    </div>
    ${diff !== 0 ? `
      <div class="edit-impact-card">
        <div class="edit-impact-label">PROJECTED ANNUAL IMPACT</div>
        <div class="edit-impact-num" style="color:${diff > 0 ? '#16a34a' : '#ef4444'}">${diff > 0 ? '+' : ''}$${annualImpact.toFixed(0)}/yr</div>
        <div class="edit-impact-sub">Based on ${changesSelected.volume} services/year at ${diff > 0 ? '+' : ''}$${diff.toFixed(2)}/service</div>
      </div>
    ` : ''}
    <div class="edit-quick-label">QUICK ADJUST</div>
    <div class="edit-quick-row">
      ${[3,5,10,15].map(bump => `<button class="edit-quick-btn" onclick="bumpPrice(${bump})">📈 +${bump}%</button>`).join('')}
      <button class="edit-quick-btn" style="border-color:#fecaca;color:var(--muted)" onclick="resetPrice()">↻ Reset</button>
    </div>
    <button class="edit-save-btn" ${(!parsedNew || parsedNew === currentPrice || changesSaving) ? 'disabled' : ''} onclick="saveChange()">
      ${changesSaving ? 'Saving...' : '✓ Approve Change'}
    </button>
    <button class="edit-cancel-btn" onclick="cancelChangeEdit()">Cancel</button>
  `;
}

function bumpPrice(bump) {
  const currentPrice = parseFloat(changesSelected.price_old);
  changesNewPrice = (currentPrice * (1 + bump / 100)).toFixed(2);
  renderChangesEditor();
}
function resetPrice() {
  changesNewPrice = parseFloat(changesSelected.price_old).toFixed(2);
  renderChangesEditor();
}
function cancelChangeEdit() {
  changesSelected = null; changesNewPrice = ''; changesSaved = false;
  renderChanges();
}

async function saveChange() {
  if (!changesSelected || changesSaving) return;
  const currentPrice = parseFloat(changesSelected.price_old);
  const parsedNew = parseFloat(changesNewPrice) || 0;
  if (!parsedNew || parsedNew === currentPrice) return;
  changesSaving = true; renderChangesEditor();
  const diff = parsedNew - currentPrice;
  const annualImpact = diff * (changesSelected.volume || 1);
  const body = {
    clinic_id: CURRENT_CLINIC,
    review_id: 'manual-' + Date.now(),
    service_code: changesSelected.service_code || 'MANUAL',
    service_name: changesSelected.service_name || changesSelected.service_code,
    price_old: parseFloat(currentPrice.toFixed(2)),
    price_new: parseFloat(parsedNew.toFixed(2)),
    source: 'manual',
    est_uplift: Math.round(annualImpact),
    status: 'applied',
    annual_volume: changesSelected.volume || 0,
  };
  try {
    await sbPost('price_recommendations', body);
    changesSaving = false; changesSaved = true;
    renderChanges();
    showToast('Price updated', 'success');
  } catch (err) {
    changesSaving = false;
    showToast('Failed: ' + err.message, 'error');
    renderChangesEditor();
  }
}

function fmtK(n) { return n >= 1000 ? '$' + (n / 1000).toFixed(1) + 'K' : '$' + Math.round(n).toLocaleString(); }
function fmtPrice(n) { return '$' + n.toFixed(2); }

// HISTORY TAB — mobile ChangeCard style
// ============================================================
async function loadHistory() {
  const el = document.getElementById('history-content');
  try {
    const recs = await sbFetch(`price_recommendations?clinic_id=eq.${CURRENT_CLINIC}&order=created_at.desc&limit=100`);
    historyData = recs;
    renderHistory();
  } catch (err) {
    el.innerHTML = `<div class="empty-state"><p>⚠️ ${err.message}</p></div>`;
  }
}

let historyExpanded = null;

function renderHistory() {
  const el = document.getElementById('history-content');
  let recs = historyData;
  const now = new Date();
  if (historyFilter === 'this_month') recs = recs.filter(r => { if (!r.created_at) return false; const d = new Date(r.created_at); return (now.getFullYear() - d.getFullYear()) * 12 + (now.getMonth() - d.getMonth()) === 0; });
  else if (historyFilter === 'last_month') recs = recs.filter(r => { if (!r.created_at) return false; const d = new Date(r.created_at); return (now.getFullYear() - d.getFullYear()) * 12 + (now.getMonth() - d.getMonth()) === 1; });

  const changes = recs.filter(i => i.price_new !== i.price_old);
  const avgPct = changes.length
    ? (changes.reduce((sum, i) => sum + ((i.price_new - i.price_old) / i.price_old * 100), 0) / changes.length).toFixed(1)
    : 0;

  // Group by date
  const groups = {};
  recs.forEach(r => {
    const key = fmtDate(r.created_at);
    if (!groups[key]) groups[key] = [];
    groups[key].push(r);
  });

  el.innerHTML = `
    <div class="filter-row" style="margin-bottom:.75rem">
      <button class="chip ${historyFilter === 'all' ? 'active' : ''}" onclick="setHistoryFilter('all')">All</button>
      <button class="chip ${historyFilter === 'this_month' ? 'active' : ''}" onclick="setHistoryFilter('this_month')">This Month</button>
      <button class="chip ${historyFilter === 'last_month' ? 'active' : ''}" onclick="setHistoryFilter('last_month')">Last Month</button>
    </div>
    <div style="margin-bottom:1.25rem;font-size:.82rem;color:var(--muted)">
      <strong style="color:var(--text)">${recs.length} recommendations</strong>${changes.length > 0 ? ` · avg ${Number(avgPct) > 0 ? '+' : ''}${avgPct}%` : ''}
    </div>
    ${recs.length === 0
      ? `<div class="empty-state"><p>No records for this period.</p></div>`
      : Object.entries(groups).map(([date, items]) => `
        <div class="report-section-label" style="margin-top:1rem">${date}</div>
        ${items.map(r => {
          const delta = r.price_new - r.price_old;
          const pct = r.price_old > 0 ? (delta / r.price_old * 100).toFixed(1) : '0';
          const isUp = delta > 0, isDown = delta < 0;
          const iconName = isUp ? '📈' : isDown ? '📉' : '➖';
          const iconColor = isUp ? '#16a34a' : isDown ? '#ef4444' : '#94a3b8';
          const iconBg = isUp ? '#f0fdf4' : isDown ? '#fef2f2' : '#f8fafc';
          const deltaAmt = Math.abs(delta).toFixed(2);
          const deltaStr = isUp ? `+$${deltaAmt}` : isDown ? `-$${deltaAmt}` : 'No change';
          const pctStr = isUp ? `+${pct}%` : isDown ? `${pct}%` : '0%';
          const expanded = historyExpanded === r.id;
          return `
            <div class="change-card-v2" onclick="toggleHistoryExpand('${r.id}')">
              <div class="change-card-icon" style="background:${iconBg};color:${iconColor}">${iconName}</div>
              <div class="change-card-mid">
                <div class="change-card-top">
                  <div class="change-card-name">${r.service_name || 'Unknown'}</div>
                  <div class="change-card-date">${fmtDate(r.created_at)}</div>
                </div>
                <div style="display:flex;align-items:center;flex-wrap:wrap">
                  <span class="change-card-prices">
                    <span class="change-price-old">${fmtMoneyDecimal(r.price_old)}</span>
                    <span class="change-price-arrow">→</span>
                    <span class="change-price-new" style="color:${isUp ? '#16a34a' : isDown ? '#ef4444' : '#64748b'}">${fmtMoneyDecimal(r.price_new)}</span>
                  </span>
                  ${delta !== 0 ? `<span class="change-delta-badge" style="background:${isUp ? '#dcfce7' : '#fee2e2'};color:${isUp ? '#15803d' : '#dc2626'}">${deltaStr} · ${pctStr}</span>` : ''}
                </div>
                ${expanded ? `
                  <div class="expanded-detail-v2">
                    <div class="expanded-row-v2"><span class="expanded-label-v2">Review: </span>${r.review_id || '—'}</div>
                    <div class="expanded-row-v2"><span class="expanded-label-v2">Annual volume: </span>${r.annual_volume || 0} visits</div>
                    <div class="expanded-row-v2"><span class="expanded-label-v2">Est. uplift: </span>${fmtMoney(r.est_uplift)}/yr</div>
                    <span class="status-pill-v2" style="background:${r.status === 'pending' ? '#fef9c3' : r.status === 'applied' ? '#dcfce7' : '#f1f5f9'};color:${r.status === 'pending' ? '#92400e' : r.status === 'applied' ? '#15803d' : '#94a3b8'}">
                      ${r.status === 'pending' ? '🕐' : '✓'} ${r.status || 'pending'}
                    </span>
                  </div>
                ` : ''}
              </div>
            </div>
          `;
        }).join('')}
      `).join('')
    }
  `;
}

function toggleHistoryExpand(id) {
  historyExpanded = historyExpanded === id ? null : id;
  renderHistory();
}

function setHistoryFilter(f) {
  historyFilter = f;
  renderHistory();
}

        <div class="settings-section-title-v2">Account</div>
        <div class="settings-card-v2">
          <div class="settings-row-v2" onclick="openSettingsSheet('notifications')">
            <div class="settings-row-icon">🔔</div>
            <div class="settings-row-mid"><div class="settings-row-label">Notifications</div></div>
            <div class="settings-row-value">${settingsPrefs.notifications ? 'On' : 'Off'}</div>
            <span class="settings-row-chevron">›</span>
          </div>
          <div class="settings-row-v2" onclick="openSettingsSheet('billing')">
            <div class="settings-row-icon">💳</div>
            <div class="settings-row-mid"><div class="settings-row-label">Billing</div></div>
            <div class="settings-row-value">${s.billing_plan || '$99/mo'}</div>
            <span class="settings-row-chevron">›</span>
          </div>
          <div class="settings-row-v2" onclick="openSettingsSheet('password')">
            <div class="settings-row-icon">🔒</div>
            <div class="settings-row-mid"><div class="settings-row-label">Change Password</div></div>
            <span class="settings-row-chevron">›</span>
          </div>
        </div>
      </div>

      <div class="settings-section-v2">
        <div class="settings-section-title-v2">Support</div>
        <div class="settings-card-v2">
          <a class="settings-row-v2" href="https://jack108510.github.io/vetinc-marketing/" target="_blank" rel="noopener">
            <div class="settings-row-icon">❓</div>
            <div class="settings-row-mid"><div class="settings-row-label">Help & FAQ</div></div>
            <span class="settings-row-chevron">↗</span>
          </a>
          <a class="settings-row-v2" href="mailto:${email || 'support@vetinc.ca'}">
            <div class="settings-row-icon">✉️</div>
            <div class="settings-row-mid"><div class="settings-row-label">Contact Support</div></div>
            <span class="settings-row-chevron">›</span>
          </a>
        </div>
      </div>

      <div class="settings-section-v2">
        <div class="settings-card-v2">
          <div class="settings-row-v2 danger" onclick="openSettingsSheet('signout')">
            <div class="settings-row-icon">↩</div>
            <div class="settings-row-mid"><div class="settings-row-label">Sign Out</div></div>
          </div>
          <div class="settings-row-v2 danger" onclick="openSettingsSheet('deleteAccount')">
            <div class="settings-row-icon">🗑</div>
            <div class="settings-row-mid"><div class="settings-row-label">Delete Account</div></div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function openSettingsSheet(type) {
  const overlay = document.getElementById('settingsSheet');
  const content = document.getElementById('settingsSheetContent');
  const s = clinicSettings || {};
  const user = settingsAccountUser || currentUser || {};
  let title = '', bodyHTML = '', actionsHTML = '';

  if (type === 'schedule') {
    settingsModal = { type, value: settingsPrefs.schedule };
    title = 'Update Schedule';
    const opts = ['Weekly', 'Bi-weekly', 'Monthly', 'Quarterly'];
    bodyHTML = opts.map(opt => `
      <div class="sheet-option ${settingsModal.value === opt ? 'selected' : ''}" onclick="setSheetOption('${opt}')">
        <div class="sheet-option-radio"></div>
        <span class="sheet-option-label">${opt}</span>
      </div>
    `).join('');
    actionsHTML = `<button class="sheet-btn cancel" onclick="closeSettingsSheet()">Cancel</button><button class="sheet-btn primary" onclick="saveSettingsSheet()">Save</button>`;
  } else if (type === 'notifications') {
    settingsModal = { type, value: settingsPrefs.notifications };
    title = 'Notifications';
    bodyHTML = renderSheetToggle('Enable push notifications', settingsModal.value, 'toggleSheetValue()');
    actionsHTML = `<button class="sheet-btn cancel" onclick="closeSettingsSheet()">Cancel</button><button class="sheet-btn primary" onclick="saveSettingsSheet()">Save</button>`;
  } else if (type === 'autoApprove') {
    settingsModal = { type, value: settingsPrefs.autoApprove };
    title = 'Auto-Approve';
    bodyHTML = renderSheetToggle('Auto-approve changes under target margin', settingsModal.value, 'toggleSheetValue()');
    actionsHTML = `<button class="sheet-btn cancel" onclick="closeSettingsSheet()">Cancel</button><button class="sheet-btn primary" onclick="saveSettingsSheet()">Save</button>`;
  } else if (type === 'pricing') {
    settingsModal = { type, value: settingsPrefs.margin };
    title = 'Target Margin';
    bodyHTML = `
      <div class="sheet-margin-val" id="sheetMarginVal">${settingsModal.value}%</div>
      <div class="sheet-margin-picks">
        ${[5,10,15,20,25,30].map(v => `<button class="sheet-margin-pick ${settingsModal.value === v ? 'active' : ''}" onclick="setSheetMargin(${v})">${v}%</button>`).join('')}
      </div>
      <div style="font-size:.82rem;color:var(--muted);text-align:center;margin-top:1rem">Recommended prices will target ${settingsModal.value}% gross margin on services</div>
    `;
    actionsHTML = `<button class="sheet-btn cancel" onclick="closeSettingsSheet()">Cancel</button><button class="sheet-btn primary" onclick="saveSettingsSheet()">Save</button>`;
  } else if (type === 'profile') {
    title = 'Clinic Profile';
    const msg = `${s.clinic_name || 'Rosslyn Veterinary'}\n${s.address || ''}, ${s.city || ''}, ${s.province || ''}\nData Source: ${s.data_source || 'Avimark'}\nLast Updated: ${(s.updated_at || '').split('T')[0]}`;
    bodyHTML = `<div class="sheet-info-text">${msg}</div>`;
    actionsHTML = `<button class="sheet-btn cancel" onclick="closeSettingsSheet()">Close</button>`;
  } else if (type === 'billing') {
    title = 'Billing';
    const msg = `Plan: ${s.billing_plan || '$99/month per location'}\nStatus: ${s.billing_status || 'Active'}\nLocations: ${s.billing_locations || 1}\nMethod: ${s.billing_method || 'Invoice'}`;
    bodyHTML = `<div class="sheet-info-text">${msg}</div>`;
    actionsHTML = `<button class="sheet-btn cancel" onclick="closeSettingsSheet()">Close</button>`;
  } else if (type === 'password') {
    settingsModal = { type };
    title = 'Change Password';
    const msg = `Account: ${user.email || user.username || 'jack@vetinc.ca'}\nA reset link will be sent to your email.`;
    bodyHTML = `<div class="sheet-info-text">${msg}</div>`;
    actionsHTML = `<button class="sheet-btn cancel" onclick="closeSettingsSheet()">Cancel</button><button class="sheet-btn primary" onclick="sendPasswordReset()">Send Reset Link</button>`;
  } else if (type === 'signout') {
    settingsModal = { type };
    title = 'Sign Out';
    bodyHTML = `<div class="sheet-info-text">Signing out will end your current session on this device.</div>`;
    actionsHTML = `<button class="sheet-btn cancel" onclick="closeSettingsSheet()">Cancel</button><button class="sheet-btn danger" onclick="doSignOut()">Sign Out</button>`;
  } else if (type === 'deleteAccount') {
    settingsModal = { type };
    title = 'Delete Account';
    bodyHTML = `<div class="sheet-info-text">This will permanently delete your account, clinic data, and all reports. This action cannot be undone.</div>`;
    actionsHTML = `<button class="sheet-btn cancel" onclick="closeSettingsSheet()">Cancel</button><button class="sheet-btn danger" onclick="doDeleteAccount()">Delete Everything</button>`;
  }

  content.innerHTML = `
    <div class="sheet-handle"></div>
    <div class="sheet-title">${title}</div>
    <div id="sheetBody">${bodyHTML}</div>
    <div class="sheet-actions">${actionsHTML}</div>
  `;
  overlay.classList.add('open');
}

function renderSheetToggle(label, value, onclick) {
  return `<div class="sheet-toggle-row"><span class="sheet-toggle-label">${label}</span><div class="sheet-toggle ${value ? 'on' : ''}" onclick="${onclick}"></div></div>`;
}

function toggleSheetValue() {
  settingsModal.value = !settingsModal.value;
  const body = document.getElementById('sheetBody');
  const label = settingsModal.type === 'notifications' ? 'Enable push notifications' : 'Auto-approve changes under target margin';
  body.innerHTML = renderSheetToggle(label, settingsModal.value, 'toggleSheetValue()');
}

function setSheetOption(opt) {
  settingsModal.value = opt;
  openSettingsSheet_Redraw();
}
function setSheetMargin(v) {
  settingsModal.value = v;
  document.getElementById('sheetMarginVal').textContent = v + '%';
  document.querySelectorAll('.sheet-margin-pick').forEach((el, i) => {
    el.classList.toggle('active', [5,10,15,20,25,30][i] === v);
  });
}
function openSettingsSheet_Redraw() {
  // Re-render the options portion for schedule
  if (settingsModal.type === 'schedule') {
    const opts = ['Weekly', 'Bi-weekly', 'Monthly', 'Quarterly'];
    document.getElementById('sheetBody').innerHTML = opts.map(opt => `
      <div class="sheet-option ${settingsModal.value === opt ? 'selected' : ''}" onclick="setSheetOption('${opt}')">
        <div class="sheet-option-radio"></div>
        <span class="sheet-option-label">${opt}</span>
      </div>
    `).join('');
  }
}

function closeSettingsSheet() {
  document.getElementById('settingsSheet').classList.remove('open');
  settingsModal = null;
}

async function saveSettingsSheet() {
  if (!settingsModal) return;
  if (settingsModal.type === 'schedule' && settingsModal.value) {
    settingsPrefs.schedule = settingsModal.value;
    await saveSetting('schedule', settingsModal.value);
  } else if (settingsModal.type === 'notifications') {
    settingsPrefs.notifications = settingsModal.value;
    await saveSetting('notifications_enabled', settingsModal.value);
  } else if (settingsModal.type === 'autoApprove') {
    settingsPrefs.autoApprove = settingsModal.value;
    await saveSetting('auto_approve', settingsModal.value);
  } else if (settingsModal.type === 'pricing') {
    settingsPrefs.margin = parseInt(settingsModal.value) || 15;
    await saveSetting('target_margin', settingsPrefs.margin);
  }
  closeSettingsSheet();
  renderSettings();
}

async function sendPasswordReset() {
  try {
    const token = Math.random().toString(36).substring(2) + Date.now().toString(36);
    const expires = new Date(Date.now() + 3600000).toISOString();
    await sbPatch(`user_accounts?clinic_id=eq.${CURRENT_CLINIC}`, { password_reset_token: token, password_reset_expires: expires });
    showToast('Reset link sent', 'success');
  } catch (e) { showToast('Failed to send reset link', 'error'); }
  closeSettingsSheet();
}

function doSignOut() {
  closeSettingsSheet();
  logout();
}

async function doDeleteAccount() {
  try {
    await Promise.all([
      sbPatch('app_sessions?active=eq.true', { active: false, expires_at: new Date().toISOString() }).catch(() => {}),
    ]);
    // Note: actual row deletion requires RAC policies; attempt anyway
    fetch(`${SB_URL}/user_accounts?clinic_id=eq.${CURRENT_CLINIC}`, { method: 'DELETE', headers: sbHeaders }).catch(() => {});
    fetch(`${SB_URL}/clinic_settings?clinic_id=eq.${CURRENT_CLINIC}`, { method: 'DELETE', headers: sbHeaders }).catch(() => {});
    fetch(`${SB_URL}/price_recommendations?clinic_id=eq.${CURRENT_CLINIC}`, { method: 'DELETE', headers: sbHeaders }).catch(() => {});
    fetch(`${SB_URL}/change_outcomes?clinic_id=eq.${CURRENT_CLINIC}`, { method: 'DELETE', headers: sbHeaders }).catch(() => {});
    fetch(`${SB_URL}/notifications?clinic_id=eq.${CURRENT_CLINIC}`, { method: 'DELETE', headers: sbHeaders }).catch(() => {});
    showToast('Account deleted', '');
    closeSettingsSheet();
    setTimeout(() => logout(), 800);
  } catch (e) {
    showToast('Failed: ' + e.message, 'error');
  }
}

async function saveSetting(field, value) {
  try {
    await sbPatch(`clinic_settings?clinic_id=eq.${CURRENT_CLINIC}`, { [field]: value });
    if (clinicSettings) clinicSettings[field] = value;
    showToast('Saved', 'success');
  } catch (err) {
    showToast('Failed: ' + err.message, 'error');
  }
}

// ============================================================
// NOTIFICATIONS
// ============================================================
async function loadNotifications() {
  try {
    const notifs = await sbFetch(`notifications?clinic_id=eq.${CURRENT_CLINIC}&order=created_at.desc&limit=50`);
    notificationsData = notifs;
    const unread = notifs.filter(n => !n.read).length;
    const badge = document.getElementById('bellBadge');
    badge.textContent = unread;
    badge.style.display = unread > 0 ? 'block' : 'none';
  } catch (err) {}
}

function openNotifications() {
  const body = document.getElementById('notifBody');
  body.innerHTML = notificationsData.length === 0
    ? `<div class="empty-state"><p>No notifications</p></div>`
    : notificationsData.map(n => `
        <div class="notif-item ${!n.read ? 'unread' : ''}" onclick="handleNotifClick('${n.id}','${n.link_id||''}')">
          <div class="ni-title">${n.title}</div>
          <div class="ni-body">${n.body||''}</div>
          <div class="ni-time">${timeAgo(n.created_at)}</div>
        </div>
      `).join('');
  document.getElementById('notifPanel').classList.add('active');
  document.getElementById('notifOverlay').classList.add('active');
}

function closeNotifications() {
  document.getElementById('notifPanel').classList.remove('active');
  document.getElementById('notifOverlay').classList.remove('active');
}

function handleNotifClick(notifId, linkId) {
  sbPatch(`notifications?id=eq.${notifId}`, { read: true }).then(() => loadNotifications()).catch(() => {});
  closeNotifications();
  if (linkId) { showTab('reports'); }
}

async function markAllRead() {
  const unread = notificationsData.filter(n => !n.read);
  for (const n of unread) { await sbPatch(`notifications?id=eq.${n.id}`, { read: true }).catch(() => {}); }
  loadNotifications();
  closeNotifications();
  showToast('All marked as read', 'success');
}

</script>
</body>
</html>
