          </div>
          <div style="background:var(--surface2);border-radius:10px;padding:1rem 1.25rem;border:1px solid var(--border);">
            <div style="font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.5rem;">Services Tracked</div>
            <div style="font-size:1.1rem;font-weight:800;color:var(--text);">${new Set(recs.map(r => r.service_code)).size}</div>
            <div style="font-size:.76rem;color:var(--muted);margin-top:2px;">Unique service codes</div>
          </div>
        </div>
      </div>

      ${daysUntilNext === 0 || pending.length > 0 ? `
      <div style="background:linear-gradient(135deg,#eff6ff,#dbeafe);border:1px solid var(--border);border-left:4px solid var(--primary);border-radius:14px;padding:1.25rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;">
        <div>
          <div style="font-size:.95rem;font-weight:700;color:var(--text);">
            ${daysUntilNext === 0 ? '🔔 Price review is due' : `📋 ${pending.length} recommendations waiting`}
          </div>
          <div style="font-size:.82rem;color:var(--muted);margin-top:4px;">
            ${daysUntilNext === 0 ? 'Your ' + schedule.toLowerCase() + ' review window is open. Review and approve recommendations.' : 'You have pending price recommendations to review and approve.'}
          </div>
        </div>
        <button class="section-action" onclick="showTab('review')" style="white-space:nowrap;">Review Now →</button>
      </div>
      ` : ''}
    `;
  } catch (err) {
    el.innerHTML = `<div class="empty-state"><p>⚠️ ${err.message}</p></div>`;
  }
}

// ============================================================
// PRICE REVIEW TAB
// ============================================================
async function loadReview() {
  const el = document.getElementById('review-content');
  try {
    const recs = await sbFetch(`price_recommendations?clinic_id=eq.${CURRENT_CLINIC}&order=est_uplift.desc&limit=200`);
    reviewData = recs;
    renderReview();
  } catch (err) {
    el.innerHTML = `<div class="empty-state"><p>⚠️ ${err.message}</p></div>`;
  }
}

function renderReview() {
  const el = document.getElementById('review-content');
  let recs = reviewData;

  if (reviewFilter === 'pending') recs = recs.filter(r => r.status === 'pending');
  else if (reviewFilter === 'applied') recs = recs.filter(r => r.status === 'applied');

  const pendingCount = reviewData.filter(r => r.status === 'pending').length;
  const appliedCount = reviewData.filter(r => r.status === 'applied').length;

  el.innerHTML = `
    <div class="section-title-row">
      <div>
        <div class="section-title">Price Recommendations</div>
        <div class="section-sub">${pendingCount} pending · ${appliedCount} approved</div>
      </div>
      ${pendingCount > 0 ? `<button class="section-action" onclick="approveAll()">Approve All Pending</button>` : ''}
    </div>
    <div class="filter-row">
      <button class="chip ${reviewFilter === 'all' ? 'active' : ''}" onclick="setReviewFilter('all')">All (${reviewData.length})</button>
      <button class="chip ${reviewFilter === 'pending' ? 'active' : ''}" onclick="setReviewFilter('pending')">Pending (${pendingCount})</button>
      <button class="chip ${reviewFilter === 'applied' ? 'active' : ''}" onclick="setReviewFilter('applied')">Approved (${appliedCount})</button>
    </div>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" placeholder="Search services…" oninput="filterReviewSearch(this.value)" id="reviewSearch">
    </div>
    <div id="reviewList"></div>
  `;

  renderReviewList(recs);
}

function renderReviewList(recs) {
  const el = document.getElementById('reviewList');
  if (!el) return;
  if (recs.length === 0) {
    el.innerHTML = `<div class="empty-state"><p>No recommendations found</p></div>`;
    return;
  }
  el.innerHTML = recs.slice(0, 100).map(r => {
    const delta = r.price_new - r.price_old;
    const pct = r.price_old > 0 ? (delta / r.price_old * 100) : 0;
    const isApplied = r.status === 'applied';
    return `
      <div class="review-card">
        <div class="review-row">
          <div>
            <div class="review-name">${r.service_name || 'Unknown Service'}</div>
            <div class="review-code">Code: ${r.service_code || '—'} · Vol: ${r.annual_volume || 0}/yr · Est. impact: ${fmtMoney(r.est_uplift || 0)}/yr</div>
          </div>
          <div class="review-prices">
            <span class="review-old">${fmtMoneyDecimal(r.price_old)}</span>
            <span class="review-arrow">→</span>
            <span class="review-new">${fmtMoneyDecimal(r.price_new)}</span>
          </div>
          <span class="pct-badge ${delta > 0 ? 'up' : delta < 0 ? 'down' : 'neutral'}">
            ${delta >= 0 ? '+' : ''}${pct.toFixed(1)}%
          </span>
          <div class="review-actions">
            <button class="btn-approve ${isApplied ? 'approved' : ''}" onclick="toggleApproval('${r.id}', '${r.status}')">
              ${isApplied ? '✓ Approved' : 'Approve'}
            </button>
            ${!isApplied ? `<button class="btn-skip" onclick="skipRec('${r.id}')">Skip</button>` : ''}
          </div>
        </div>
      </div>
    `;
  }).join('') + (recs.length > 100 ? `<p style="text-align:center;color:var(--muted);padding:1rem;">+ ${recs.length - 100} more…</p>` : '');
}

function setReviewFilter(f) {
  reviewFilter = f;
  renderReview();
}

function filterReviewSearch(q) {
  if (!q) { renderReviewList(reviewData.filter(r => reviewFilter === 'all' ? true : r.status === reviewFilter)); return; }
  const ql = q.toLowerCase();
  const filtered = reviewData.filter(r =>
    (r.service_name || '').toLowerCase().includes(ql) ||
    (r.service_code || '').toLowerCase().includes(ql)
  );
  renderReviewList(filtered);
}

async function toggleApproval(itemId, currentStatus) {
  const newStatus = currentStatus === 'applied' ? 'pending' : 'applied';
  try {
    await sbPatch(`price_recommendations?id=eq.${itemId}`, { status: newStatus });
    showToast(newStatus === 'applied' ? '✓ Approved' : 'Reverted', 'success');
    loadReview();
    loadOverview();
  } catch (err) {
    showToast('Failed: ' + err.message, 'error');
  }
}

async function skipRec(itemId) {
  try {
    await sbPatch(`price_recommendations?id=eq.${itemId}`, { status: 'skipped' });
    showToast('Skipped', '');
    loadReview();
  } catch (err) {
    showToast('Failed: ' + err.message, 'error');
  }
}

async function approveAll() {
  const pending = reviewData.filter(r => r.status === 'pending');
  if (pending.length === 0) { showToast('Nothing to approve', ''); return; }
  try {
    for (const r of pending) {
      await sbPatch(`price_recommendations?id=eq.${r.id}`, { status: 'applied' });
    }
    showToast(`✓ ${pending.length} recommendations approved`, 'success');
    loadReview();
    loadOverview();
  } catch (err) {
    showToast('Failed: ' + err.message, 'error');
  }
}

// ============================================================
// MONITOR TAB — post-change flagging
// ============================================================
async function loadMonitor() {
  const el = document.getElementById('monitor-content');
  try {
    // Get applied recommendations — these are what we monitor
    const applied = await sbFetch(`price_recommendations?clinic_id=eq.${CURRENT_CLINIC}&status=eq.applied&order=created_at.desc&limit=200`);

    if (applied.length === 0) {
      el.innerHTML = `
        <div class="section-title-row">
          <div><div class="section-title">Post-Change Monitor</div><div class="section-sub">Track performance after price changes</div></div>
        </div>
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
          <p>No approved price changes to monitor yet.</p>
          <p style="margin-top:8px;font-size:.8rem;">Once you approve recommendations, we'll flag any services that underperform after the change.</p>
        </div>
      `;
      return;
    }

    // Group by service and check for underperformance
    // Flag: price went up but est_uplift was high and it's been >30 days
    const now = Date.now();
    const flags = applied.map(r => {
      const daysSinceChange = Math.floor((now - new Date(r.created_at).getTime()) / 86400000);
      const pct = r.price_old > 0 ? ((r.price_new - r.price_old) / r.price_old * 100) : 0;
      // Flagging logic: large increase + enough time has passed to see impact
      let flagType = 'ok';
      let flagLabel = 'Tracking';
      if (daysSinceChange < 14) { flagType = 'ok'; flagLabel = 'Too early to flag'; }
      else if (pct > 15) { flagType = 'warn'; flagLabel = 'Watch: Large increase'; }
      else if (pct > 25) { flagType = 'alert'; flagLabel = 'Review: Very large increase'; }
      else { flagType = 'ok'; flagLabel = 'Performing normally'; }
      return { ...r, daysSinceChange, pct, flagType, flagLabel };
    });

    const watchFlags = flags.filter(f => f.flagType !== 'ok' || f.daysSinceChange >= 14);
    const alertCount = flags.filter(f => f.flagType === 'alert').length;
    const warnCount = flags.filter(f => f.flagType === 'warn').length;

    el.innerHTML = `
      <div class="section-title-row">
        <div>
          <div class="section-title">Post-Change Monitor</div>
          <div class="section-sub">${applied.length} price changes tracked · ${alertCount} alerts · ${warnCount} warnings</div>
        </div>
      </div>

      <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:1.5rem;">
        <div class="kpi-card">
          <div class="kpi-label">Changes Tracked</div>
          <div class="kpi-value">${applied.length}</div>
          <div class="kpi-sub">Price changes applied</div>
        </div>
        <div class="kpi-card amber">
          <div class="kpi-label">Warnings</div>
          <div class="kpi-value amber">${warnCount}</div>
          <div class="kpi-sub">Large increases to watch</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Avg Change</div>
          <div class="kpi-value">+${(applied.reduce((s, r) => s + (r.price_old > 0 ? ((r.price_new - r.price_old) / r.price_old * 100) : 0), 0) / applied.length).toFixed(1)}%</div>
          <div class="kpi-sub">Across all applied changes</div>
        </div>
      </div>

      <div class="table-card">
        <div class="table-header">
          <div class="table-header-title">Applied Price Changes</div>
          <div class="table-meta">${applied.length} changes</div>
        </div>
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>Service</th>
                <th>Code</th>
                <th class="num">Old Price</th>
                <th class="num">New Price</th>
                <th class="num">Change</th>
                <th class="num">Days Active</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              ${flags.slice(0, 50).map(r => `
                <tr>
                  <td>${r.service_name || '—'}</td>
                  <td class="muted">${r.service_code || '—'}</td>
                  <td class="num muted">${fmtMoneyDecimal(r.price_old)}</td>
                  <td class="num">${fmtMoneyDecimal(r.price_new)}</td>
                  <td class="num ${r.pct > 0 ? 'green' : 'red'}">${r.pct >= 0 ? '+' : ''}${r.pct.toFixed(1)}%</td>
                  <td class="num muted">${r.daysSinceChange}d</td>
                  <td>
                    <span class="flag-badge ${r.flagType === 'ok' ? 'ok' : r.flagType === 'warn' ? 'warn' : 'alert'}" style="font-size:.7rem;padding:3px 9px;">
                      ${r.flagLabel}
                    </span>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `;
  } catch (err) {
    el.innerHTML = `<div class="empty-state"><p>⚠️ ${err.message}</p></div>`;
  }
}

// ============================================================
// HISTORY TAB
// ============================================================
async function loadHistory() {
  const el = document.getElementById('history-content');
  try {
    const recs = await sbFetch(`price_recommendations?clinic_id=eq.${CURRENT_CLINIC}&order=created_at.desc&limit=500`);
    historyData = recs;
    renderHistory();
  } catch (err) {
    el.innerHTML = `<div class="empty-state"><p>⚠️ ${err.message}</p></div>`;
  }
}

function renderHistory() {
  const el = document.getElementById('history-content');
  let recs = historyData;
  const now = new Date();
  if (historyFilter === 'this_month') recs = recs.filter(r => new Date(r.created_at) >= new Date(now.getFullYear(), now.getMonth(), 1));
  else if (historyFilter === 'last_month') recs = recs.filter(r => { const d = new Date(r.created_at); return d >= new Date(now.getFullYear(), now.getMonth() - 1, 1) && d < new Date(now.getFullYear(), now.getMonth(), 1); });
  else if (historyFilter === 'applied') recs = recs.filter(r => r.status === 'applied');

  // Group by date
  const groups = {};
  recs.forEach(r => {
    const key = r.created_at?.split('T')[0] || 'unknown';
    if (!groups[key]) groups[key] = [];
    groups[key].push(r);
  });

  el.innerHTML = `
    <div class="section-title-row">
      <div>
        <div class="section-title">Change History</div>
        <div class="section-sub">${recs.length} ${recs.length === 1 ? 'record' : 'records'}</div>
      </div>
    </div>
    <div class="filter-row">
      <button class="chip ${historyFilter === 'all' ? 'active' : ''}" onclick="setHistoryFilter('all')">All</button>
      <button class="chip ${historyFilter === 'applied' ? 'active' : ''}" onclick="setHistoryFilter('applied')">Applied</button>
      <button class="chip ${historyFilter === 'this_month' ? 'active' : ''}" onclick="setHistoryFilter('this_month')">This Month</button>
      <button class="chip ${historyFilter === 'last_month' ? 'active' : ''}" onclick="setHistoryFilter('last_month')">Last Month</button>
    </div>
    ${recs.length === 0
      ? `<div class="empty-state"><p>No records found</p></div>`
      : Object.entries(groups).map(([date, items]) => `
        <div class="history-date-header">${fmtDate(date)}</div>
        ${items.map(r => {
          const delta = r.price_new - r.price_old;
          const pct = r.price_old > 0 ? (delta / r.price_old * 100) : 0;
          return `
            <div class="history-item">
              <div class="history-item-left">
                <div class="hi-name">${r.service_name || 'Unknown'}</div>
                <div class="hi-meta">Code: ${r.service_code || '—'} · ${fmtMoneyDecimal(r.price_old)} → ${fmtMoneyDecimal(r.price_new)} · Vol: ${r.annual_volume || 0}/yr</div>
              </div>
              <div class="hi-right">
                <span class="pct-badge ${delta > 0 ? 'up' : delta < 0 ? 'down' : 'neutral'}">${delta >= 0 ? '+' : ''}${pct.toFixed(1)}%</span>
                <span class="status-pill ${r.status || 'pending'}">${r.status || 'pending'}</span>
              </div>
            </div>
          `;
        }).join('')}
      `).join('')
    }
  `;
}

function setHistoryFilter(f) {
  historyFilter = f;
  renderHistory();
}

async function saveSetting(field, value) {

// ============================================================
// NOTIFICATIONS
// ============================================================
async function loadNotifications() {
  try {
    const notifs = await sbFetch(`notifications?clinic_id=eq.${CURRENT_CLINIC}&order=created_at.desc&limit=50`);
    notificationsData = notifs;
    const unread = notifs.filter(n => !n.read).length;
    const badge = document.getElementById('bellBadge');
    badge.textContent = unread;
    badge.style.display = unread > 0 ? 'block' : 'none';
  } catch (err) {}
}

function openNotifications() {
  const body = document.getElementById('notifBody');
  body.innerHTML = notificationsData.length === 0
    ? `<div class="empty-state"><p>No notifications</p></div>`
    : notificationsData.map(n => `
        <div class="notif-item ${!n.read ? 'unread' : ''}" onclick="handleNotifClick('${n.id}','${n.link_id||''}')">
          <div class="ni-title">${n.title}</div>
          <div class="ni-body">${n.body||''}</div>
          <div class="ni-time">${timeAgo(n.created_at)}</div>
        </div>
      `).join('');
  document.getElementById('notifPanel').classList.add('active');
  document.getElementById('notifOverlay').classList.add('active');
}

function closeNotifications() {
  document.getElementById('notifPanel').classList.remove('active');
  document.getElementById('notifOverlay').classList.remove('active');
}

function handleNotifClick(notifId, linkId) {
  sbPatch(`notifications?id=eq.${notifId}`, { read: true }).then(() => loadNotifications()).catch(() => {});
  closeNotifications();
  if (linkId) { showTab('review'); }
}

async function markAllRead() {
  const unread = notificationsData.filter(n => !n.read);
  for (const n of unread) { await sbPatch(`notifications?id=eq.${n.id}`, { read: true }).catch(() => {}); }
  loadNotifications();
  closeNotifications();
  showToast('All marked as read', 'success');
}
