<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" href="favicon.png">
<link rel="apple-touch-icon" href="icon.png">
<title>Vet INC — Pricing Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ============ RESET & TOKENS ============ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --blue: #2563eb;
  --blue-light: #dbeafe;
  --blue-dark: #1d4ed8;
  --primary-light: #60a5fa;
  --gray: #94a3b8;
  --gray-light: #f1f5f9;
  --gray-border: #e2e8f0;
  --green: #059669;
  --green-light: #d1fae5;
  --red: #ef4444;
  --red-light: #fee2e2;
  --amber: #d97706;
  --amber-light: #fef3c7;
  --purple: #7c3aed;
  --purple-light: #ede9fe;
  --bg: #f0f6ff;
  --surface: #ffffff;
  --surface2: #eff6ff;
  --border-light: #dbeafe;
  --card: #ffffff;
  --text: #1e3a5f;
  --text-secondary: #64748b;
  --text-light: #94a3b8;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-lg: 0 4px 24px rgba(0,0,0,0.08);
  --sidebar-w: 240px;
}

html, body { height:100%; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
button { font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
input { font-family:inherit; outline:none; border:none; }
a { color: var(--blue); text-decoration:none; }

/* ============ SCROLLBAR ============ */
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:3px; }

/* ============ LOGIN ============ */
#loginScreen {
  position:fixed; inset:0; z-index:9999;
  display:flex; align-items:center; justify-content:center;
  background:var(--bg);
  padding:20px;
}
.login-card {
  background:#fff; border-radius:20px; padding:28px 24px;
  width:100%; max-width:340px; box-shadow:0 4px 16px rgba(0,0,0,0.08);
}
.login-logo-img {
  width:100px; height:100px; margin:0 auto 16px;
  display:block; object-fit:cover; border-radius:24px;
  box-shadow:0 4px 16px rgba(37,99,235,0.15);
}
.login-brand-name { text-align:center; font-size:26px; font-weight:800; color:var(--text); margin-bottom:2px; letter-spacing:-0.5px; }
.login-brand-name span { color:var(--blue); }
.login-card .subtitle { text-align:center; color:var(--gray); font-size:13px; margin-bottom:28px; }
.input-group { margin-bottom:16px; }
.input-group label { display:block; font-size:13px; font-weight:500; margin-bottom:6px; color:var(--text-secondary); }
.input-group input {
  width:100%; padding:14px 16px; font-size:15px;
  background:var(--gray-light); border:1.5px solid transparent;
  border-radius:12px; transition:border-color .2s;
}
.input-group input:focus { border-color:var(--blue); }
.btn-primary {
  width:100%; padding:15px; font-size:16px; font-weight:700;
  background:var(--blue); color:#fff; border-radius:14px;
  transition:background .2s;
}
.btn-primary:hover { background:var(--blue-dark); }
.btn-primary:active { transform:scale(0.98); }
.btn-primary:disabled { opacity:0.5; cursor:not-allowed; }
.login-toggle { text-align:center; margin-top:16px; font-size:13px; color:var(--text-secondary); }
.login-toggle button { color:var(--blue); font-weight:500; }
.login-error { background:var(--red-light); color:var(--red); padding:10px 14px; border-radius:var(--radius-sm); font-size:13px; margin-bottom:16px; display:none; }
.demo-hint { text-align:center; margin-top:20px; padding:10px; background:var(--gray-light); border-radius:var(--radius-sm); font-size:12px; color:var(--text-secondary); }

/* ============ APP LAYOUT ============ */
#app { display:none; }
#app.active { display:flex; min-height:100vh; }

/* Sidebar (hidden — mobile app style uses topbar + bottom tabs) */
.sidebar {
  display:none !important;
}
.sidebar-logo {
  display:flex; align-items:center; gap:10px; padding:0 20px 24px;
  border-bottom:1px solid var(--gray-border); margin-bottom:12px;
}
.sidebar-logo .logo-icon {
  width:38px; height:38px; border-radius:10px;
  background:linear-gradient(135deg, var(--blue), var(--blue-dark));
  display:flex; align-items:center; justify-content:center;
  font-size:18px; font-weight:800; color:#fff;
}
.sidebar-logo .logo-text { font-size:17px; font-weight:700; }
.sidebar-logo .logo-text small { display:block; font-size:11px; font-weight:400; color:var(--text-secondary); }
.sidebar nav { flex:1; padding:0 12px; }
.nav-item {
  display:flex; align-items:center; gap:12px;
  padding:11px 14px; border-radius:var(--radius-sm);
  font-size:14px; font-weight:500; color:var(--text-secondary);
  transition:all .15s; margin-bottom:2px; width:100%; text-align:left;
}
.nav-item:hover { background:var(--gray-light); color:var(--text); }
.nav-item.active { background:var(--blue-light); color:var(--blue); font-weight:600; }
.nav-item svg { width:22px; height:22px; flex-shrink:0; stroke-width:2; }
.nav-badge {
  margin-left:auto; background:var(--red); color:#fff;
  font-size:11px; font-weight:700; padding:2px 7px; border-radius:10px;
  min-width:20px; text-align:center;
}
.sidebar-user {
  padding:16px 20px; border-top:1px solid var(--gray-border);
  display:flex; align-items:center; gap:10px;
}
.sidebar-user .avatar {
  width:36px; height:36px; border-radius:10px;
  background:var(--blue); color:#fff; display:flex;
  align-items:center; justify-content:center;
  font-size:13px; font-weight:700;
}
.sidebar-user .user-info { flex:1; min-width:0; }
.sidebar-user .user-info .name { font-size:13px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.sidebar-user .user-info .email { font-size:11px; color:var(--text-secondary); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

/* Main content */
.main-content {
  flex:1; margin:0 auto;
  padding:0 0 80px; max-width:480px;
  width:100%;
  min-height:100vh;
}

/* TopBar (always visible — mobile app style) */
.topbar {
  display:flex;
  background:#fff; border-bottom:1px solid var(--gray-border);
  padding:6px 4px 6px 12px; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:50;
  max-width:480px; margin:0 auto; width:100%;
  box-shadow:0 1px 12px rgba(37,99,235,0.07);
}
.topbar .topbar-logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
.topbar .topbar-logo img { height:28px; width:28px; object-fit:cover; border-radius:6px; }
.topbar .topbar-logo .logo-text { font-size:17px; font-weight:800; color:var(--text); }
.topbar .topbar-logo .logo-text span { color:var(--blue); }
.topbar .header-divider { width:1px; height:20px; background:var(--border-light); }
.topbar .clinic-name { font-size:12px; color:var(--text-secondary); font-weight:500; }
.topbar .bell-btn { position:relative; padding:8px; }
.topbar .bell-btn svg { width:24px; height:24px; }
.topbar .bell-badge {
  position:absolute; top:4px; right:4px;
  background:var(--red); color:#fff; font-size:10px; font-weight:700;
  padding:1px 5px; border-radius:8px; min-width:16px; text-align:center;
}

/* Bottom tabs (always visible) */
.bottom-tabs {
  display:block;
  position:fixed; bottom:0; left:50%; transform:translateX(-50%); right:auto; z-index:100;
  background:#fff; border-top:1px solid var(--gray-border);
  padding:8px 0 env(safe-area-inset-bottom, 8px);
  height:64px;
  width:100%; max-width:480px;
}
.bottom-tabs .tab-inner {
  display:flex; align-items:center; justify-content:space-around; height:100%;
}
.tab-btn {
  display:flex; flex-direction:column; align-items:center; gap:3px;
  font-size:10px; font-weight:500; color:var(--gray); padding:4px 12px;
  transition:color .15s;
}
.tab-btn.active { color:var(--blue); }
.tab-btn svg { width:24px; height:24px; stroke-width:2; }

/* ============ PAGE ============ */
.page { display:none; animation:fadeIn .2s ease; padding:16px; }
.page.active { display:block; }
@keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }

.page-header { margin-bottom:20px; }
.page-title { font-size:24px; font-weight:700; }
.page-subtitle { font-size:14px; color:var(--text-secondary); margin-top:2px; }

/* ============ CARDS ============ */
.card {
  background:var(--card); border:1px solid var(--gray-border);
  border-radius:14px; padding:16px; box-shadow:0 1px 3px rgba(15,23,42,0.03);
  margin-bottom:16px;
}
.card-title { font-size:14px; font-weight:700; color:#334155; margin-bottom:10px; }

/* ============ HOME ============ */
.home-clinic-name { font-size:20px; font-weight:700; margin-top:16px; margin-bottom:2px; }
.home-data-date { font-size:12px; color:var(--gray); margin-bottom:14px; }

.hero-row { display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; margin-bottom:18px; }
.hero-tile {
  background:var(--card); border:0.5px solid #f1f5f9; border-top:3px solid var(--blue); border-radius:14px;
  padding:12px; box-shadow:0 1px 3px rgba(15,23,42,0.03);
}
.hero-tile .label { font-size:10px; font-weight:700; color:var(--gray); text-transform:uppercase; letter-spacing:0.4px; margin-bottom:4px; }
.hero-tile .value { font-size:20px; font-weight:800; letter-spacing:-0.3px; }
.hero-tile .delta { font-size:10px; font-weight:500; margin-top:2px; }
.delta.positive { color:var(--green); }
.delta.negative { color:var(--red); }
.delta.neutral { color:var(--text-secondary); }

.section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.section-header h3 { font-size:16px; font-weight:600; }

.quarterly-row { display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; margin-bottom:22px; }
.quarterly-tile {
  text-align:center; padding:16px 12px;
  background:var(--gray-light); border-radius:var(--radius-sm);
}
.quarterly-tile .num { font-size:24px; font-weight:800; }
.quarterly-tile .lbl { font-size:11px; color:var(--text-secondary); margin-top:2px; }

/* Grade circle */
.grade-section { display:flex; align-items:center; gap:24px; }
.grade-circle {
  width:56px; height:56px; border-radius:28px; flex-shrink:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  border:4px solid; font-weight:800;
}
.grade-circle .grade-letter { font-size:28px; line-height:1; }
.grade-A { border-color:var(--green); color:var(--green); background:var(--green-light); }
.grade-B { border-color:var(--blue); color:var(--blue); background:var(--blue-light); }
.grade-C { border-color:var(--amber); color:var(--amber); background:var(--amber-light); }
.grade-D { border-color:var(--red); color:var(--red); background:var(--red-light); }

.verdict-breakdown { flex:1; }
.verdict-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.verdict-row .v-label { font-size:13px; font-weight:500; width:120px; flex-shrink:0; }
.verdict-row .v-bar { flex:1; height:8px; background:var(--gray-light); border-radius:4px; overflow:hidden; }
.verdict-row .v-fill { height:100%; border-radius:4px; transition:width .5s ease; }
.verdict-row .v-count { font-size:13px; font-weight:600; width:28px; text-align:right; }
.v-fill.green { background:var(--green); }
.v-fill.amber { background:var(--amber); }
.v-fill.red { background:var(--red); }
.v-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.v-dot.green { background:var(--green); }
.v-dot.amber { background:var(--amber); }
.v-dot.red { background:var(--red); }

/* ============ REPORTS ============ */
.report-card {
  background:var(--card); border:1px solid var(--gray-border); border-radius:var(--radius);
  padding:20px; margin-bottom:14px; box-shadow:var(--shadow);
  cursor:pointer; transition:transform .1s, box-shadow .2s;
}
.report-card:hover { box-shadow:var(--shadow-lg); }
.report-card:active { transform:scale(0.99); }
.report-card-header { display:flex; align-items:flex-start; gap:14px; }
.report-icon {
  width:44px; height:44px; border-radius:12px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:22px;
}
.report-icon.copilot { background:var(--blue-light); color:var(--blue); }
.report-icon.autopilot { background:var(--green-light); color:var(--green); }
.report-icon.monitor { background:var(--purple-light); color:var(--purple); }
.report-info { flex:1; min-width:0; }
.report-info h3 { font-size:16px; font-weight:600; margin-bottom:2px; }
.report-info .report-sub { font-size:13px; color:var(--text-secondary); }
.report-big-num { display:flex; align-items:baseline; gap:6px; margin-top:12px; }
.report-big-num .num { font-size:28px; font-weight:800; }
.report-big-num .lbl { font-size:13px; color:var(--text-secondary); }
.report-opp { font-size:13px; font-weight:600; color:var(--green); margin-top:2px; }
.report-progress { margin-top:10px; }
.progress-bar { height:6px; background:var(--gray-light); border-radius:3px; overflow:hidden; }
.progress-fill { height:100%; border-radius:3px; background:var(--blue); transition:width .4s ease; }
.report-cpi { font-size:12px; color:var(--text-secondary); margin-top:8px; }

/* Report Modal */
.modal-overlay {
  position:fixed; inset:0; z-index:200;
  background:rgba(0,0,0,0.4); display:none;
  align-items:flex-end; justify-content:center;
}
.modal-overlay.active { display:flex; }
.modal-sheet {
  background:#fff; width:100%; max-width:600px;
  max-height:85vh; border-radius:20px 20px 0 0;
  display:flex; flex-direction:column; overflow:hidden;
  animation:slideUp .25s ease;
}
@keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
.modal-header { padding:20px; border-bottom:1px solid var(--gray-border); display:flex; align-items:center; justify-content:space-between; }
.modal-header h3 { font-size:18px; font-weight:600; }
.modal-close { padding:6px; font-size:20px; color:var(--text-secondary); }
.modal-body { flex:1; overflow-y:auto; padding:16px 20px; }

.change-item {
  background:var(--gray-light); border-radius:var(--radius-sm); padding:14px;
  margin-bottom:10px; display:flex; align-items:center; gap:12px;
}
.change-item .ci-info { flex:1; min-width:0; }
.change-item .ci-name { font-size:14px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.change-item .ci-code { font-size:12px; color:var(--text-secondary); }
.change-item .ci-prices { font-size:13px; font-weight:600; display:flex; align-items:center; gap:6px; }
.change-item .ci-actions { display:flex; gap:6px; }
.ci-btn { padding:6px 14px; border-radius:8px; font-size:12px; font-weight:600; }
.ci-btn.approve { background:var(--green); color:#fff; }
.ci-btn.reject { background:var(--gray-light); color:var(--text-secondary); border:1px solid var(--gray-border); }

.approve-all-bar { padding:16px 20px; border-top:1px solid var(--gray-border); display:flex; gap:10px; }

/* ============ CHANGES ============ */
.search-bar { position:relative; margin-bottom:16px; }
.search-bar input {
  width:100%; padding:12px 14px 12px 42px; font-size:15px;
  border:1.5px solid var(--gray-border); border-radius:var(--radius-sm);
  background:#fff;
}
.search-bar svg { position:absolute; left:14px; top:50%; transform:translateY(-50%); width:18px; height:18px; color:var(--gray); }
.search-bar input:focus { border-color:var(--blue); }

.service-row {
  background:var(--card); border:1px solid var(--gray-border); border-radius:var(--radius-sm);
  padding:14px 16px; margin-bottom:8px; cursor:pointer;
  display:flex; align-items:center; justify-content:space-between;
  transition:box-shadow .2s;
}
.service-row:hover { box-shadow:var(--shadow); }
.service-row .sr-name { font-size:14px; font-weight:500; }
.service-row .sr-meta { font-size:12px; color:var(--text-secondary); }
.service-row .sr-price { font-size:16px; font-weight:700; }

/* Price editor */
.price-editor { background:var(--card); border:1px solid var(--gray-border); border-radius:var(--radius); padding:24px; margin-bottom:16px; }
.price-editor .pe-service-name { font-size:16px; font-weight:600; margin-bottom:4px; }
.price-editor .pe-service-code { font-size:13px; color:var(--text-secondary); margin-bottom:20px; }
.price-input-wrap { display:flex; align-items:center; gap:8px; margin-bottom:16px; }
.price-input-wrap .dollar { font-size:32px; font-weight:700; color:var(--text-secondary); }
.price-input-wrap input {
  width:120px; font-size:36px; font-weight:800; border:none;
  border-bottom:2px solid var(--gray-border); padding:4px 0;
  text-align:center;
}
.price-input-wrap input:focus { border-bottom-color:var(--blue); }
.delta-badge {
  display:inline-flex; align-items:center; gap:4px;
  padding:4px 10px; border-radius:20px; font-size:13px; font-weight:600;
}
.delta-badge.positive { background:var(--green-light); color:var(--green); }
.delta-badge.negative { background:var(--red-light); color:var(--red); }
.delta-badge.neutral { background:var(--gray-light); color:var(--text-secondary); }

.bump-buttons { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
.bump-btn {
  padding:8px 16px; border-radius:20px; font-size:13px; font-weight:600;
  background:var(--blue-light); color:var(--blue); transition:all .15s;
}
.bump-btn:hover { background:var(--blue); color:#fff; }

.impact-preview {
  background:var(--green-light); border-radius:var(--radius-sm);
  padding:14px; display:flex; align-items:center; justify-content:space-between;
  margin-bottom:16px;
}
.impact-preview .ip-label { font-size:13px; color:var(--text-secondary); }
.impact-preview .ip-value { font-size:18px; font-weight:700; color:var(--green); }

.btn-save {
  width:100%; padding:14px; font-size:15px; font-weight:600;
  background:var(--blue); color:#fff; border-radius:var(--radius-sm);
}
.btn-save:hover { background:var(--blue-dark); }
.btn-save:disabled { opacity:0.5; }

/* ============ HISTORY ============ */
.filter-chips { display:flex; gap:8px; margin-bottom:16px; }
.chip {
  padding:6px 16px; border-radius:20px; font-size:13px; font-weight:500;
  background:#fff; border:1px solid var(--gray-border); color:var(--text-secondary);
}
.chip.active { background:var(--blue); color:#fff; border-color:var(--blue); }

.history-summary { font-size:13px; color:var(--text-secondary); margin-bottom:16px; }
.date-header { font-size:13px; font-weight:600; color:var(--text-secondary); margin:16px 0 8px; }

.history-card {
  background:var(--card); border:1px solid var(--gray-border); border-radius:var(--radius-sm);
  padding:14px 16px; margin-bottom:8px; cursor:pointer;
}
.history-card-header { display:flex; align-items:center; justify-content:space-between; }
.history-card .hc-name { font-size:14px; font-weight:500; }
.history-card .hc-prices { font-size:13px; color:var(--text-secondary); margin-top:2px; }
.history-card .hc-right { display:flex; align-items:center; gap:8px; }
.status-pill {
  padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600;
}
.status-pill.pending { background:var(--amber-light); color:var(--amber); }
.status-pill.applied { background:var(--green-light); color:var(--green); }
.history-card-detail { display:none; padding-top:12px; margin-top:12px; border-top:1px solid var(--gray-border); font-size:13px; color:var(--text-secondary); }
.history-card.expanded .history-card-detail { display:block; }
.history-card-detail .detail-row { margin-bottom:4px; }

/* ============ SETTINGS ============ */
.profile-card { display:flex; align-items:center; gap:16px; }
.profile-avatar {
  width:56px; height:56px; border-radius:14px;
  background:var(--blue); color:#fff;
  display:flex; align-items:center; justify-content:center;
  font-size:20px; font-weight:700;
}
.profile-info .name { font-size:17px; font-weight:600; }
.profile-info .email { font-size:13px; color:var(--text-secondary); }

.settings-section { margin-bottom:16px; }
.settings-section h3 { font-size:13px; font-weight:600; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:10px; padding-left:4px; }
.settings-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 0; border-bottom:1px solid var(--gray-border);
}
.settings-row:last-child { border-bottom:none; }
.settings-row .sr-label { font-size:14px; }
.settings-row .sr-value { font-size:14px; color:var(--text-secondary); }

/* Toggle switch */
.toggle { width:44px; height:24px; border-radius:12px; background:#cbd5e1; position:relative; cursor:pointer; transition:background .2s; }
.toggle.active { background:var(--blue); }

function fmtMoney(n) {
  if (n == null || isNaN(n)) return '$0';
  return '$' + Math.round(n).toLocaleString('en-US');
}

function fmtMoneyDecimal(n) {
  if (n == null || isNaN(n)) return '$0.00';
  return '$' + Number(n).toFixed(2);
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: '2-digit', year: 'numeric' });
}

function fmtDateShort(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return (d.getMonth() + 1) + '/' + d.getDate() + '/' + d.getFullYear();
}

function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const hrs = Math.floor(diff / 3600000);
  if (hrs < 1) return 'Just now';
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  if (days < 7) return days + 'd ago';
  return fmtDate(iso);
}

function computeGrade(confident, uncertain, reverted) {
  const total = confident + uncertain + reverted;
  if (total === 0) return { grade: 'B', score: 75 };
  const score = Math.round((confident * 100 + uncertain * 50) / total);
  let grade = 'D';
  if (score >= 85) grade = 'A';
  else if (score >= 70) grade = 'B';
  else if (score >= 50) grade = 'C';
  return { grade, score };
}

async function sha256(text) {
  const encoder = new TextEncoder();
  const data = encoder.encode(text);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

document.getElementById('loginBtn').addEventListener('click', doLogin);

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');

  if (!email || !password) { errEl.textContent = 'Please enter email and password'; errEl.style.display = 'block'; return; }

  btn.disabled = true;
  btn.textContent = 'Signing in...';

  try {
    const hash = await sha256(password + SALT);

    if (isSignup) {
      const clinicName = document.getElementById('signupClinic').value.trim();
      const confirm = document.getElementById('signupConfirm').value;
      if (!clinicName) throw new Error('Clinic name is required');
      if (password !== confirm) throw new Error('Passwords do not match');

      const existing = await sbFetch(`vet_auth?username=eq.${encodeURIComponent(email)}&limit=1`);
      if (existing.length > 0) throw new Error('Email already registered');

      await sbPost('vet_auth', {
        username: email,
        password_hash: hash,
        clinic: clinicName,
        role: 'admin',
        active: true,
        clinic_id: CURRENT_CLINIC
      });

      const user = (await sbFetch(`vet_auth?username=eq.${encodeURIComponent(email)}&limit=1`))[0];
      currentUser = user;
    } else {
      // Try vet_auth first
      let users = await sbFetch(`vet_auth?username=eq.${encodeURIComponent(email)}&active=eq.true&limit=1`);
      if (users.length > 0 && users[0].password_hash === hash) {
        currentUser = users[0];
      } else {
        // Fallback to user_accounts
        users = await sbFetch(`user_accounts?email=eq.${encodeURIComponent(email)}&limit=1`);
        if (users.length > 0) {
          // For user_accounts, accept any password with the right hash pattern
          // or compare against vet_auth hash
          const vetAuth = await sbFetch(`vet_auth?username=eq.${encodeURIComponent(email)}&limit=1`);
          if (vetAuth.length > 0 && vetAuth[0].password_hash === hash) {
            currentUser = vetAuth[0];
          } else {
            throw new Error('Invalid email or password');
          }
        } else {
          throw new Error('Invalid email or password');
        }
      }
    }

    // Store session
    sessionStorage.setItem('vetinc_user', JSON.stringify(currentUser));

    // Load app
    enterApp();
  } catch (err) {
    errEl.textContent = err.message || 'Login failed';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = isSignup ? 'Create Account' : 'Sign In';
  }
}

async function loadHome() {
  const el = document.getElementById('page-home');
  el.innerHTML = '<div class="loading-center"><div class="spinner"></div></div>';

  try {
    // Fetch data in parallel
    const [reports, recs, notifs, settings, revenueData] = await Promise.all([
      sbFetch(`reports?clinic_id=eq.${CURRENT_CLINIC}&status=eq.active&order=sort_order.asc`),
      sbFetch(`price_recommendations?clinic_id=eq.${CURRENT_CLINIC}&order=created_at.desc`),
      sbFetch(`notifications?clinic_id=eq.${CURRENT_CLINIC}&order=created_at.desc`),
      sbFetch(`clinic_settings?clinic_id=eq.${CURRENT_CLINIC}&limit=1`),
      sbFetch(`csi_pf_totals?ros=not.is.null&order=day.desc&limit=30&select=day,mdy,ros,daily_total`)
    ]);

    clinicSettings = settings[0] || {};
    reportsData = reports;
    historyData = recs;
    notificationsData = notifs;

    // Calculate metrics
    const clinicName = clinicSettings.clinic_name || 'Rosslyn Veterinary Hospital';
    const dataDate = reports.length > 0 ? fmtDate(reports[0].created_at) : 'N/A';

    // Revenue from csi_pf_totals (sum last 30 days of ros)
    const revenue = revenueData.reduce((sum, r) => sum + (r.ros || 0), 0);
    const revenuePrev = revenueData.slice(15).reduce((s, r) => s + (r.ros || 0), 0);
    const revenueRecent = revenueData.slice(0, 15).reduce((s, r) => s + (r.ros || 0), 0);
    const revenueDelta = revenuePrev > 0 ? ((revenueRecent - revenuePrev) / revenuePrev * 100) : 0;

    // Avg invoice
    const visitDays = revenueData.filter(r => r.ros != null);
    const avgInvoice = visitDays.length > 0 ? revenue / visitDays.length : 0;
    const totalVisits = visitDays.length;

    // Price changes count
    const priceChanges = recs.filter(r => r.status === 'applied').length;
    const avgAdj = recs.length > 0
      ? recs.reduce((s, r) => s + ((r.price_new - r.price_old) / r.price_old * 100), 0) / recs.length

async function loadReports() {
  const el = document.getElementById('page-reports');
  el.innerHTML = '<div class="loading-center"><div class="spinner"></div></div>';

  try {
    const reports = await sbFetch(`reports?clinic_id=eq.${CURRENT_CLINIC}&status=eq.active&order=sort_order.asc`);
    reportsData = reports;

    if (reports.length === 0) {
      el.innerHTML = `
        <div class="page-header"><div class="page-title">Reports</div></div>
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <p>No reports available yet</p>
        </div>
      `;
      return;
    }

    // Smart sort: copilot first, then monitor, then autopilot
    const orderMap = { copilot: 1, monitor: 2, autopilot: 3 };
    reports.sort((a, b) => (orderMap[a.report_type] || 9) - (orderMap[b.report_type] || 9));

    el.innerHTML = `
      <div class="page-header">
        <div class="page-title">Reports</div>
        <div class="page-subtitle">${reports.length} active ${reports.length === 1 ? 'report' : 'reports'}</div>
      </div>
      <div id="reportList"></div>
    `;

    const listEl = document.getElementById('reportList');
    listEl.innerHTML = reports.map(r => {
      const data = r.data || {};
      const flagged = data.flagged_services || 0;
      const opp = data.total_opportunity || 0;
      const approved = data.approved_count || 0;
      const progress = flagged > 0 ? (approved / flagged * 100) : 0;
      const cpi = data.cpi_label || '';
      const iconClass = r.report_type || 'copilot';
      const iconEmoji = r.report_type === 'autopilot' ? '⚡' : r.report_type === 'monitor' ? '📊' : '📈';

      return `
        <div class="report-card" onclick="openReport('${r.id}')">
          <div class="report-card-header">
            <div class="report-icon ${iconClass}">${iconEmoji}</div>
            <div class="report-info">
              <h3>${r.title}</h3>
              <div class="report-sub">${r.subtitle || ''}</div>
              <div class="report-big-num">
                <span class="num">${flagged}</span>
                <span class="lbl">flagged services</span>
              </div>
              <div class="report-opp">${fmtMoney(opp)} opportunity</div>
              ${progress > 0 ? `
                <div class="report-progress">
                  <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
                </div>
              ` : ''}
              ${cpi ? `<div class="report-cpi">${cpi}</div>` : ''}
            </div>
          </div>
        </div>
      `;
    }).join('');
  } catch (err) {
    el.innerHTML = `<div class="empty-state"><p>⚠️ ${err.message}</p></div>`;
  }
}

async function openReport(reportId) {
  const report = reportsData.find(r => r.id === reportId);
  if (!report) return;
  currentReport = report;

  document.getElementById('modalTitle').textContent = report.title;
  const body = document.getElementById('modalBody');
  const approveBar = document.getElementById('approveAllBar');

  body.innerHTML = '<div class="loading-center"><div class="spinner"></div></div>';
  document.getElementById('reportModal').classList.add('active');

  try {
    // Get recommendations for this report
    const changes = await sbFetch(`price_recommendations?clinic_id=eq.${CURRENT_CLINIC}&review_id=eq.${report.data?.monitoring_id || report.id}&order=est_uplift.desc&limit=200`);

    if (changes.length === 0) {
      // Try without review_id filter for copilot reports
      const allChanges = await sbFetch(`price_recommendations?clinic_id=eq.${CURRENT_CLINIC}&order=est_uplift.desc&limit=50`);
      if (allChanges.length > 0) {
        renderReportChanges(allChanges);
      } else {
        body.innerHTML = `
          <div class="empty-state">
            <p>No price changes in this report.</p>
            <p style="margin-top:8px; font-size:13px;">${report.subtitle || ''}</p>
          </div>
        `;
        approveBar.style.display = 'none';
      }
    } else {
      renderReportChanges(changes);
      approveBar.style.display = report.report_type === 'copilot' ? 'flex' : 'none';
    }
  } catch (err) {
    body.innerHTML = `<div class="empty-state"><p>⚠️ ${err.message}</p></div>`;
    approveBar.style.display = 'none';
  }
}

function renderReportChanges(changes) {
  const body = document.getElementById('modalBody');
  body.innerHTML = changes.slice(0, 50).map(c => {
    const delta = c.price_new - c.price_old;
    const pct = c.price_old > 0 ? (delta / c.price_old * 100) : 0;
    const isPositive = delta > 0;
    return `
      <div class="change-item">
        <div class="ci-info">
          <div class="ci-name">${c.service_name || 'Unknown'}</div>
          <div class="ci-code">${c.service_code || ''} · Vol: ${c.annual_volume || 0}/yr</div>
        </div>
        <div class="ci-prices">
          ${fmtMoneyDecimal(c.price_old)} → ${fmtMoneyDecimal(c.price_new)}
          <span class="delta-badge ${isPositive ? 'positive' : 'negative'}">
            ${isPositive ? '+' : ''}${pct.toFixed(1)}%
          </span>
        </div>
        <div class="ci-actions">
          <button class="ci-btn ${c.status === 'applied' ? 'approve' : 'reject'}" onclick="toggleApproval('${c.id}', '${c.status}')">
            ${c.status === 'applied' ? '✓ Approved' : 'Approve'}
          </button>
        </div>
      </div>
    `;
  }).join('') + (changes.length > 50 ? `<p style="text-align:center; color:var(--text-secondary); padding:12px;">+ ${changes.length - 50} more...</p>` : '');
}

async function toggleApproval(itemId, currentStatus) {
  const newStatus = currentStatus === 'applied' ? 'pending' : 'applied';
  try {
    await sbPatch(`price_recommendations?id=eq.${itemId}`, { status: newStatus });
    showToast(`${newStatus === 'applied' ? 'Approved' : 'Reverted'} successfully`, 'success');
    // Refresh modal
    if (currentReport) openReport(currentReport.id);
  } catch (err) {
    showToast('Failed to update: ' + err.message, 'error');
  }
}

async function approveAll() {
  if (!currentReport) return;
  try {
    const changes = await sbFetch(`price_recommendations?clinic_id=eq.${CURRENT_CLINIC}&review_id=eq.${currentReport.data?.monitoring_id || currentReport.id}&status=eq.pending&limit=200`);
    for (const c of changes) {
      await sbPatch(`price_recommendations?id=eq.${c.id}`, { status: 'applied' });
    }
    showToast(`${changes.length} recommendations approved!`, 'success');
    openReport(currentReport.id);
  } catch (err) {
    showToast('Failed: ' + err.message, 'error');
  }
}

function closeModal() {
  document.getElementById('reportModal').classList.remove('active');
}

  el.innerHTML = `

      <input type="text" id="serviceSearch" placeholder="Search services..." oninput="searchServices(this.value)">
    </div>

      <div class="empty-state">
        <p style="font-size:14px;">Start typing to search services</p>
      </div>
    </div>
  `;

let searchTimeout = null;
async function searchServices(query) {
  clearTimeout(searchTimeout);
  if (!query || query.length < 2) {
    document.getElementById('searchResults').innerHTML = '<div class="empty-state"><p style="font-size:14px;">Start typing to search services</p></div>';
    return;
  }

  searchTimeout = setTimeout(async () => {
    const resultsEl = document.getElementById('searchResults');
    resultsEl.innerHTML = '<div class="loading-center"><div class="spinner"></div></div>';

    try {
      // Try dhv_service_history first, fallback to price_recommendations for service list
      let services = await sbFetch(`price_recommendations?clinic_id=eq.${CURRENT_CLINIC}&service_name=ilike.*${encodeURIComponent(query)}*&order=created_at.desc&limit=50`);

      // Deduplicate by service_code
      const seen = new Set();
      services = services.filter(s => {
        const key = s.service_code;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });

      if (services.length === 0) {
        resultsEl.innerHTML = `<div class="empty-state"><p>No services found for "${query}"</p></div>`;
        return;
      }

      resultsEl.innerHTML = services.map(s => `
        <div class="service-row" onclick="editPrice('${s.service_code}', '${encodeURIComponent(s.service_name || 'Unknown')}', ${s.price_new || s.price_old || 0}, ${s.annual_volume || 0})">
          <div>
            <div class="sr-name">${s.service_name || 'Unknown'}</div>
            <div class="sr-meta">Code: ${s.service_code || 'N/A'} · Vol: ${s.annual_volume || 0}/yr</div>
          </div>
          <div class="sr-price">${fmtMoneyDecimal(s.price_new || s.price_old)}</div>
        </div>
      `).join('');
    } catch (err) {
      resultsEl.innerHTML = `<div class="empty-state"><p>⚠️ ${err.message}</p></div>`;
    }
  }, 300);
}

function editPrice(code, nameEncoded, currentPrice, volume) {
  const name = decodeURIComponent(nameEncoded);
  selectedService = { code, name, currentPrice, volume };
  const resultsEl = document.getElementById('searchResults');

  resultsEl.innerHTML = `
    <div class="price-editor">
      <div class="pe-service-name">${name}</div>
      <div class="pe-service-code">Code: ${code} · Annual Volume: ${volume}</div>

      <div class="price-input-wrap">
        <span class="dollar">$</span>
        <input type="number" id="priceInput" value="${currentPrice.toFixed(2)}" step="0.50" oninput="updateDelta()">
        <span class="delta-badge neutral" id="deltaBadge">No change</span>
      </div>

      <div class="bump-buttons">
        <button class="bump-btn" onclick="bumpPrice(0.03)">+3%</button>
        <button class="bump-btn" onclick="bumpPrice(0.05)">+5%</button>
        <button class="bump-btn" onclick="bumpPrice(0.10)">+10%</button>
        <button class="bump-btn" onclick="bumpPrice(0.15)">+15%</button>
        <button class="bump-btn" onclick="bumpPrice(-0.05)" style="background:var(--red-light); color:var(--red);">−5%</button>
      </div>

      <div class="impact-preview" id="impactPreview" style="display:none">
        <span class="ip-label">Estimated Annual Impact</span>
        <span class="ip-value" id="impactValue">$0</span>
      </div>

      <button class="btn-save" id="saveBtn" onclick="savePriceChange()">Save Price Change</button>
    </div>
    <button class="btn-logout" onclick="loadChanges()" style="margin-top:8px;">← Back to Search</button>
  `;
}

function bumpPrice(percent) {
  const input = document.getElementById('priceInput');
  const current = selectedService.currentPrice;
  const newPrice = (current * (1 + percent)).toFixed(2);
  input.value = newPrice;
  updateDelta();
}

function updateDelta() {
  const input = document.getElementById('priceInput');
  const newPrice = parseFloat(input.value) || 0;
  const oldPrice = selectedService.currentPrice;
  const diff = newPrice - oldPrice;
  const pct = oldPrice > 0 ? (diff / oldPrice * 100) : 0;

  const badge = document.getElementById('deltaBadge');
  if (Math.abs(diff) < 0.01) {
    badge.className = 'delta-badge neutral';
    badge.textContent = 'No change';
  } else if (diff > 0) {
    badge.className = 'delta-badge positive';
    badge.textContent = `+$${diff.toFixed(2)} (+${pct.toFixed(1)}%)`;
  } else {
    badge.className = 'delta-badge negative';
    badge.textContent = `−$${Math.abs(diff).toFixed(2)} (${pct.toFixed(1)}%)`;
  }

  // Annual impact
  const impactEl = document.getElementById('impactPreview');
  const impactVal = document.getElementById('impactValue');
  const annualImpact = diff * selectedService.volume;
  if (Math.abs(annualImpact) > 0.5) {
    impactEl.style.display = 'flex';
    impactVal.textContent = (annualImpact >= 0 ? '+' : '−') + fmtMoney(Math.abs(annualImpact));
    impactVal.style.color = annualImpact >= 0 ? 'var(--green)' : 'var(--red)';
  } else {
    impactEl.style.display = 'none';
  }
}

async function savePriceChange() {
  if (!selectedService) return;
  const input = document.getElementById('priceInput');
  const btn = document.getElementById('saveBtn');
  const newPrice = parseFloat(input.value);

  if (!newPrice || newPrice <= 0) {
    showToast('Enter a valid price', 'error');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Saving...';

  try {
    await sbPost('price_recommendations', {
      clinic_id: CURRENT_CLINIC,
      review_id: 'manual-' + Date.now(),
      service_code: selectedService.code,
      service_name: selectedService.name,
      price_old: selectedService.currentPrice,
      price_new: newPrice,
      source: 'manual',
      est_uplift: Math.round((newPrice - selectedService.currentPrice) * selectedService.volume),
      status: 'applied',
      annual_volume: selectedService.volume
    });

    btn.textContent = '✓ Saved!';
    btn.style.background = 'var(--green)';
    showToast('Price change saved successfully!', 'success');

    setTimeout(() => {
      loadChanges();
      loadHistory(); // Refresh history
    }, 1500);
  } catch (err) {
    btn.disabled = false;
    btn.textContent = 'Save Price Change';
    showToast('Failed: ' + err.message, 'error');
  }
}

let historyFilter = 'all';

async function loadHistory() {
  const el = document.getElementById('page-history');
  el.innerHTML = '<div class="loading-center"><div class="spinner"></div></div>';

  try {
    const recs = await sbFetch(`price_recommendations?clinic_id=eq.${CURRENT_CLINIC}&order=created_at.desc&limit=500`);
    historyData = recs;
    renderHistory();
  } catch (err) {
    el.innerHTML = `<div class="empty-state"><p>⚠️ ${err.message}</p></div>`;
  }
}

function renderHistory() {
  const el = document.getElementById('page-history');
  let recs = historyData;

  // Filter
  const now = new Date();
  if (historyFilter === 'this_month') {
    recs = recs.filter(r => new Date(r.created_at) >= new Date(now.getFullYear(), now.getMonth(), 1));
  } else if (historyFilter === 'last_month') {
    recs = recs.filter(r => {
      const d = new Date(r.created_at);
      return d >= new Date(now.getFullYear(), now.getMonth() - 1, 1) && d < new Date(now.getFullYear(), now.getMonth(), 1);
    });
  }

  // Summary
  const avgPct = recs.length > 0
    ? recs.reduce((s, r) => s + ((r.price_new - r.price_old) / r.price_old * 100), 0) / recs.length
    : 0;

  // Group by date
  const groups = {};
  recs.forEach(r => {
    const dateKey = r.created_at?.split('T')[0] || 'unknown';
    if (!groups[dateKey]) groups[dateKey] = [];
    groups[dateKey].push(r);
  });

  el.innerHTML = `
    <div class="page-header">
      <div class="page-title">History</div>
      <div class="page-subtitle">${recs.length} ${recs.length === 1 ? 'recommendation' : 'recommendations'} · avg ${avgPct >= 0 ? '+' : ''}${avgPct.toFixed(1)}%</div>
    </div>
    <div class="filter-chips">
      <button class="chip ${historyFilter === 'all' ? 'active' : ''}" onclick="setHistoryFilter('all')">All</button>
      <button class="chip ${historyFilter === 'this_month' ? 'active' : ''}" onclick="setHistoryFilter('this_month')">This Month</button>
      <button class="chip ${historyFilter === 'last_month' ? 'active' : ''}" onclick="setHistoryFilter('last_month')">Last Month</button>
    </div>
    <div class="history-summary">Showing ${recs.length} ${recs.length === 1 ? 'item' : 'items'}</div>
    <div id="historyList"></div>
  `;

  const listEl = document.getElementById('historyList');
  if (recs.length === 0) {
    listEl.innerHTML = '<div class="empty-state"><p>No recommendations found</p></div>';
    return;
  }

  listEl.innerHTML = Object.entries(groups).map(([date, items]) => `
    <div class="date-header">${fmtDate(date)}</div>
    ${items.map(r => {
      const delta = r.price_new - r.price_old;
      const pct = r.price_old > 0 ? (delta / r.price_old * 100) : 0;
      return `
        <div class="history-card" onclick="this.classList.toggle('expanded')">
          <div class="history-card-header">
            <div>
              <div class="hc-name">${r.service_name || 'Unknown'}</div>
              <div class="hc-prices">${fmtMoneyDecimal(r.price_old)} → ${fmtMoneyDecimal(r.price_new)}</div>
            </div>
            <div class="hc-right">
              <span class="delta-badge ${delta > 0 ? 'positive' : delta < 0 ? 'negative' : 'neutral'}">
                ${delta > 0 ? '+' : ''}${pct.toFixed(1)}%
              </span>
              <span class="status-pill ${r.status}">${r.status}</span>
            </div>
          </div>
          <div class="history-card-detail">
            <div class="detail-row"><strong>Source:</strong> ${r.source || 'N/A'}</div>
            <div class="detail-row"><strong>Est. Uplift:</strong> ${fmtMoney(r.est_uplift)}/yr</div>
            <div class="detail-row"><strong>Annual Volume:</strong> ${r.annual_volume || 0}</div>
            <div class="detail-row"><strong>Code:</strong> ${r.service_code || 'N/A'}</div>
          </div>
        </div>
      `;
    }).join('')}
  `).join('');
}

function setHistoryFilter(filter) {
  historyFilter = filter;
  renderHistory();
}

  } catch (err) {
    el.innerHTML = `<div class="empty-state"><p>⚠️ ${err.message}</p></div>`;
  }
}

async function saveSetting(field, value) {
  try {
    await sbPatch(`clinic_settings?clinic_id=eq.${CURRENT_CLINIC}`, { [field]: value });
    clinicSettings[field] = value;
    showToast('Setting saved', 'success');
  } catch (err) {
    showToast('Failed to save: ' + err.message, 'error');
  }
}

// ============================================================
// NOTIFICATIONS
// ============================================================
async function loadNotifications() {
  try {
    const notifs = await sbFetch(`notifications?clinic_id=eq.${CURRENT_CLINIC}&order=created_at.desc&limit=50`);
    notificationsData = notifs;

    // Update badge
    const unread = notifs.filter(n => !n.read).length;
    const badge = document.getElementById('bellBadge');
    if (unread > 0) {
      badge.textContent = unread;
      badge.style.display = 'block';
    } else {
      badge.style.display = 'none';
    }
  } catch (err) {
    console.error('Notif load error:', err);
  }
}

function openNotifications() {
  const panel = document.getElementById('notifPanel');
  const overlay = document.getElementById('notifOverlay');
  const body = document.getElementById('notifBody');

  if (notificationsData.length === 0) {
    body.innerHTML = '<div class="empty-state"><p>No notifications</p></div>';
  } else {
    body.innerHTML = notificationsData.map(n => `
      <div class="notif-item ${!n.read ? 'unread' : ''}" onclick="handleNotifClick('${n.id}', '${n.link_id || ''}')">
        <div class="ni-title">${n.title}</div>
        <div class="ni-body">${n.body || ''}</div>
        <div class="ni-time">${timeAgo(n.created_at)}</div>
      </div>
    `).join('');
  }

  panel.classList.add('active');
  overlay.classList.add('active');
}

function closeNotifications() {
  document.getElementById('notifPanel').classList.remove('active');
  document.getElementById('notifOverlay').classList.remove('active');
}

function handleNotifClick(notifId, linkId) {
  // Mark as read
  sbPatch(`notifications?id=eq.${notifId}`, { read: true }).then(() => {
    loadNotifications();
  });
  closeNotifications();
  if (linkId) {
    switchPage('reports');
    setTimeout(() => openReport(linkId), 300);
  }
}

async function markAllRead() {
  try {
    const unread = notificationsData.filter(n => !n.read);
    for (const n of unread) {
      await sbPatch(`notifications?id=eq.${n.id}`, { read: true });
    }
    loadNotifications();
    openNotifications();
    showToast('All marked as read', 'success');
  } catch (err) {
    showToast('Failed: ' + err.message, 'error');
  }
}

// Close modal on overlay click
document.getElementById('reportModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
